    description: "One row per TLC taxi zone from the raw_zones source"
    columns:
      - name: location_id
        description: "Unique identifier for each TLC taxi zone."
        tests:
          - not_null
          - unique

        # TODO: Task 5 -- this column is the join key. Which two generic tests
